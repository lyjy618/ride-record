<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1677ff" />
  <title>跑车记录 - 网约车司机工作助手</title>
  <style>
    /* ========== 重置 ========== */
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue','Helvetica','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;font-size:14px;-webkit-font-smoothing:antialiased}
    #app{min-width:320px;max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;background:#f0f2f5;position:relative;overflow:hidden}
    /* ========== 底部导航 ========== */
    .tab-bar{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:56px;background:#fff;border-top:1px solid #eee;display:flex;align-items:center;z-index:9999;padding-bottom:env(safe-area-inset-bottom,0)}
    .tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#999;font-size:10px;cursor:pointer;padding:6px 0;transition:color .15s;user-select:none}
    .tab-item.on{color:#1677ff}
    .tab-icon{font-size:22px;line-height:1}
    .tab-label{font-size:10px;line-height:1.2}
    /* ========== 页面容器 ========== */
    .page-view{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:60px;-webkit-overflow-scrolling:touch}
    /* ========== 地图页 ========== */
    .map-page{position:relative;width:100%;height:100%}
    .map-box{width:100%;height:100%;background:#e8eaf0}
    .map-err{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:5;background:rgba(255,255,255,.95);border-radius:16px;padding:24px;max-width:280px}
    .map-err-icon{font-size:40px;margin-bottom:8px}
    .map-err-text{font-size:14px;color:#666;margin-bottom:4px}
    .map-err-tip{font-size:12px;color:#999}
    .map-retry{margin-top:12px;background:#1677ff;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:14px;cursor:pointer}
    .map-status{position:absolute;top:max(env(safe-area-inset-top,12px),12px);left:50%;transform:translateX(-50%);background:rgba(255,255,255,.96);border-radius:20px;padding:7px 14px;display:flex;align-items:center;gap:8px;font-size:13px;box-shadow:0 2px 12px rgba(0,0,0,.12);z-index:10;white-space:nowrap}
    .dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
    .dot-green{background:#52c41a}
    .dot-yellow{background:#faad14;animation:pulse 1s infinite}
    .dot-red{background:#ff4d4f}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .map-today{margin-left:6px;border-left:1px solid #e5e5e5;padding-left:8px;color:#1677ff;font-weight:600}
    .map-addr{position:absolute;top:62px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.96);border-radius:10px;padding:7px 12px;display:flex;align-items:center;gap:6px;font-size:12px;color:#333;max-width:90%;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:10;width:max-content;max-width:calc(100% - 32px)}
    .addr-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px}
    .map-btns{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);display:flex;gap:14px;z-index:10}
    .rec-btn{border:none;border-radius:16px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;width:120px;height:82px;transition:transform .12s,opacity .12s;padding:0}
    .rec-btn:active:not(:disabled){transform:scale(.93)}
    .rec-btn:disabled{opacity:.4;cursor:not-allowed}
    .rec-btn .main{font-size:15px;line-height:1.3}
    .rec-btn .sub{font-size:10px;font-weight:400;opacity:.8;margin-top:3px}
    .btn-up{background:linear-gradient(135deg,#52c41a,#73d13d)}
    .btn-down{background:linear-gradient(135deg,#ff4d4f,#ff7875)}
    .toast-pop{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.72);color:#fff;padding:12px 28px;border-radius:10px;font-size:15px;z-index:9999;pointer-events:none;white-space:nowrap}
    /* ========== 历史页 ========== */
    .hist{padding:16px 16px 70px}
    .date-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:14px}
    .date-btn2{background:#1677ff;color:#fff;border:none;border-radius:50%;width:34px;height:34px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .date-btn2:disabled{background:#ccc;cursor:not-allowed}
    .date-lbl{font-size:16px;font-weight:600;min-width:100px;text-align:center}
    .day-stat{background:#fff;border-radius:12px;padding:14px 16px;display:flex;justify-content:space-around;align-items:center;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
    .day-stat .item{display:flex;flex-direction:column;align-items:center;gap:3px}
    .day-stat .num{font-size:26px;font-weight:700}
    .day-stat .lbl{font-size:11px;color:#888}
    .day-stat .div{width:1px;height:36px;background:#eee}
    .rec-card{background:#fff;border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
    .rec-icon2{font-size:26px;flex-shrink:0}
    .rec-body{flex:1;min-width:0}
    .rec-kind{font-size:14px;font-weight:600;color:#222}
    .rec-addr{font-size:12px;color:#888;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .rec-time2{font-size:11px;color:#bbb;margin-top:2px}
    .rec-del{background:none;border:none;color:#ccc;font-size:17px;cursor:pointer;padding:4px;flex-shrink:0}
    .empty-state{text-align:center;padding:48px 20px}
    .empty-state .e-icon{font-size:48px;margin-bottom:12px;opacity:.5}
    .empty-state .e-txt{font-size:15px;color:#999;margin-bottom:6px}
    .empty-state .e-tip{font-size:12px;color:#bbb}
    /* ========== 收支页 ========== */
    .inc{padding:16px 16px 70px}
    .inc-card{background:linear-gradient(135deg,#1677ff,#5294e8);border-radius:16px;padding:18px 20px;color:#fff;margin-bottom:14px}
    .inc-card-hd{font-size:12px;opacity:.8;margin-bottom:10px}
    .inc-card-bd{display:flex;justify-content:space-between}
    .inc-card .ci{display:flex;flex-direction:column;gap:3px}
    .inc-card .ci-lbl{font-size:11px;opacity:.7}
    .inc-card .ci-val{font-size:20px;font-weight:700}
    .inc-card .ci-val.green{color:#b7eb8f}
    .inc-card .ci-val.red{color:#ff9999}
    .form-box{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
    .form-title{font-size:13px;font-weight:600;margin-bottom:10px}
    .cat-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
    .cat-pill{background:#fff;border:1.5px solid #e0e0e0;border-radius:16px;padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap}
    .cat-pill.on-inc{border-color:#52c41a;color:#52c41a;background:#f6ffed}
    .cat-pill.on-exp{border-color:#ff4d4f;color:#ff4d4f;background:#fff1f0}
    .amt-row{display:flex;align-items:center;margin-bottom:10px}
    .yuan{font-size:22px;font-weight:700;color:#888;margin-right:6px}
    .amt-input{flex:1;font-size:26px;font-weight:700;border:none;outline:none;color:#222;background:transparent;width:100%}
    .note-input2{width:100%;border:1px solid #eee;border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:10px}
    .do-btn{width:100%;background:#1677ff;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer}
    .do-btn:disabled{background:#ccc}
    .quick-row{display:flex;gap:10px;margin-bottom:14px}
    .quick-btn2{flex:1;background:#fff;border:1px solid #eee;border-radius:10px;padding:10px 4px;font-size:13px;font-weight:600;color:#ff4d4f;cursor:pointer;text-align:center;line-height:1.3}
    .quick-btn2 small{display:block;font-size:11px;font-weight:400;color:#999;margin-top:1px}
    .sec-title{font-size:13px;font-weight:600;margin-bottom:8px;margin-top:4px}
    .inc-list{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06)}
    .inc-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #f5f5f5;gap:10px}
    .inc-row:last-child{border-bottom:none}
    .inc-body{flex:1}
    .inc-cat{font-size:13px;font-weight:600}
    .inc-note{font-size:11px;color:#999;margin-top:1px}
    .inc-time{font-size:11px;color:#bbb;margin-top:1px}
    .inc-amt{font-size:15px;font-weight:700}
    .inc-amt.green{color:#52c41a}
    .inc-amt.red{color:#ff4d4f}
    .inc-del{background:none;border:none;color:#ccc;font-size:15px;cursor:pointer;padding:4px}
    /* ========== 统计页 ========== */
    .stat{padding:16px 16px 70px}
    .wk-card{background:linear-gradient(135deg,#141c28,#1e3a5f);border-radius:16px;padding:18px 16px;margin-bottom:14px}
    .wk-hd{color:rgba(255,255,255,.55);font-size:12px;margin-bottom:14px}
    .wk-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .wk-item{background:rgba(255,255,255,.07);border-radius:10px;padding:12px 8px;text-align:center}
    .wk-item .wi-icon{font-size:20px;margin-bottom:2px}
    .wk-item .wi-num{font-size:22px;font-weight:700;color:#fff}
    .wk-item .wi-lbl{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px}
    .card2{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
    .card2-hd{font-size:13px;font-weight:600;margin-bottom:10px}
    .peak-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .peak-pill{background:#e6f4ff;color:#1677ff;border-radius:12px;padding:4px 12px;font-size:13px;font-weight:600}
    .bar-chart{display:flex;align-items:flex-end;gap:2px;height:56px;padding-bottom:18px;position:relative}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
    .bar-fg{width:100%;background:linear-gradient(to top,#1677ff,#69b1ff);border-radius:2px 2px 0 0;min-height:3px;transition:height .3s}
    .bar-lbl{position:absolute;bottom:-16px;font-size:9px;color:#bbb}
    .x-lbl{text-align:center;font-size:10px;color:#ccc;margin-top:2px}
    .exp-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .exp-row:last-child{margin-bottom:0}
    .exp-c{font-size:13px;color:#888;min-width:52px}
    .exp-bd{flex:1;height:8px;background:#f5f5f5;border-radius:4px;overflow:hidden}
    .exp-fg{height:100%;background:#ff7875;border-radius:4px;transition:width .3s}
    .exp-v{font-size:13px;font-weight:600;color:#ff4d4f;min-width:48px;text-align:right}
    .hm-box{width:100%;height:260px;border-radius:10px;overflow:hidden;background:#f0f0f0}
    .hm-tip{font-size:12px;color:#bbb;text-align:center;padding:10px}
    .wk-nav{display:flex;justify-content:space-between}
    .wk-nav-btn{background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer}
    .wk-nav-btn:disabled{color:#ccc;cursor:not-allowed}
    .fade-enter-active,.fade-leave-active{transition:opacity .3s}.fade-enter-from,.fade-leave-to{opacity:0}
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://webapi.amap.com/maps?v=2.0&key=59b217300fed74cf72a4090b12cca4b3"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.0/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue-router@4.2.5/dist/vue-router.global.prod.js"></script>
<script>
(function(){
'use strict';

// ==================== 数据层 ====================
const S = Vue.reactive({
  rides: JSON.parse(localStorage.getItem('h5_r') || '[]'),
  inc:   JSON.parse(localStorage.getItem('h5_i') || '[]'),
});
const sv = () => (localStorage.setItem('h5_r', JSON.stringify(S.rides)), localStorage.setItem('h5_i', JSON.stringify(S.inc)));
const addR = (t,p,a) => (S.rides.unshift({id:Date.now(),type:t,lat:p.lat,lng:p.lng,addr:a||'未知',time:new Date().toISOString()}),sv());
const delR = id => (S.rides=S.rides.filter(x=>x.id!==id),sv());
const addI = (c,a,n) => (S.inc.unshift({id:Date.now(),cat:c,amt:parseFloat(a),note:n||'',time:new Date().toISOString(),type:c==='流水'?'in':'out'}),sv());
const delI = id => (S.inc=S.inc.filter(x=>x.id!==id),sv());

// 工具
const wr_ = d => { const day=d.getDay(),dif=d.getDate()-day+(day===0?-6:1),s=new Date(d);s.setDate(dif);s.setHours(0,0,0,0);const e=new Date(s);e.setDate(s.getDate()+6);e.setHours(23,59,59,999);return {s,e}; };
const dr_ = d => { const s=new Date(d);s.setHours(0,0,0,0);const e=new Date(d);e.setHours(23,59,59,999);return {s,e}; };
const flt = (a,s,e) => a.filter(x=>{const t=new Date(x.time);return t>=s&&t<=e;});

// ==================== 地图页 ====================
const MapPage = {
  template:`
<div class="map-page">
  <div id="map-canvas" class="map-box"></div>
  <div class="map-status">
    <div class="dot" :class="stCls"></div>
    <span>{{ stTxt }}</span>
    <span class="map-today">今日 {{ todayN }} 单</span>
  </div>
  <div class="map-addr" v-if="addr"><span>📍</span><span class="addr-text">{{ addr }}</span></div>
  <div class="map-btns">
    <button class="rec-btn btn-up" @click="rec('up')" :disabled="!pos||busy"><span class="main">🚗 乘客上车</span><span class="sub">记录接单位置</span></button>
    <button class="rec-btn btn-down" @click="rec('down')" :disabled="!pos||busy"><span class="main">🏁 乘客下车</span><span class="sub">记录到达位置</span></button>
  </div>
  <div class="map-err" v-if="err">
    <div class="map-err-icon">⚠️</div>
    <div class="map-err-text">地图加载失败</div>
    <div class="map-err-tip">{{ err }}</div>
    <button class="map-retry" @click="init">重试</button>
  </div>
  <transition name="fade"><div class="toast-pop" v-if="msg">{{ msg }}</div></transition>
</div>`,
  setup(){
    const pos  = Vue.ref(null);
    const addr = Vue.ref('');
    const busy = Vue.ref(false);
    const msg  = Vue.ref('');
    const err  = Vue.ref('');
    let map=null, geo=null, mPos=null, mRides=[];

    const stCls = Vue.computed(()=>{ if(err.value)return'err'; return pos.value?'green':'yellow'; });
    const stTxt = Vue.computed(()=>{ if(err.value)return'加载失败'; return pos.value?'定位成功':'定位中...'; });
    const todayN = Vue.computed(()=>{ const{ s,e }=dr_(new Date());return flt(S.rides,s,e).length; });

    function toast(m){msg.value=m;setTimeout(()=>msg.value='',2200);}

    function drawPos(p){
      pos.value={lng:p.lng,lat:p.lat};
      if(!map)return;
      map.setCenter([p.lng,p.lat]);
      if(mPos)map.remove(mPos);
      mPos=new AMap.Marker({position:[p.lng,p.lat],
        content:'<div style="width:18px;height:18px;background:#1677ff;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(22,119,255,.5)"></div>',
        offset:new AMap.Pixel(-9,-9)
      });
      map.add(mPos);
    }

    function drawRide(p,t){
      if(!map)return;
      const ic=t==='up'
        ?'<div style="width:28px;height:28px;background:#52c41a;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:14px">🚗</span></div>'
        :'<div style="width:28px;height:28px;background:#ff4d4f;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:14px">🏁</span></div>';
      const m=new AMap.Marker({position:[p.lng,p.lat],content:ic,offset:new AMap.Pixel(-14,-28)});
      map.add(m);
      mRides.push(m);
    }

    function doGeo(){
      return new Promise(res=>{
        if(!geo){res();return;}
        geo.getCurrentPosition((s,r)=>{if(s==='complete')drawPos(r.position);res();});
      });
    }

    async function rec(t){
      if(!pos.value)return;
      busy.value=true;
      try{
        await doGeo();
        addR(t,pos.value,addr.value);
        drawRide(pos.value,t);
        toast(t==='up'?'✅ 上车位置已记录':'🏁 下车位置已记录');
      }finally{busy.value=false;}
    }

    function init(){
      err.value='';
      if(typeof AMap==='undefined'){err.value='高德地图未加载，请检查网络';return;}
      try{
        map=new AMap.Map('map-canvas',{zoom:15,center:[116.397428,39.90923],viewMode:'2D',resizeEnable:true});
        AMap.plugin('AMap.Geolocation',()=>{
          geo=new AMap.Geolocation({enableHighAccuracy:true,timeout:8000,showButton:false});
          map.addControl(geo);
          geo.getCurrentPosition((s,r)=>{
            if(s==='complete'){
              drawPos(r.position);
              new AMap.Geocoder().getAddress([r.position.lng,r.position.lat],(st,re)=>{
                if(st==='complete')addr.value=re.regeocode.formattedAddress;
              });
            }
          });
        });
        const{ s,e }=dr_(new Date());
        flt(S.rides,s,e).forEach(r=>drawRide(r,r.type));
      }catch(e){err.value=e.message||'未知错误';}
    }

    Vue.onMounted(()=>{setTimeout(init,500);});
    Vue.onUnmounted(()=>{if(map)map.destroy();});
    return {pos,addr,busy,msg,err,stCls,stTxt,todayN,rec,init};
  }
};

// ==================== 历史页 ====================
const HistPage = {
  template:`
<div class="hist page-view">
  <div class="date-row">
    <button class="date-btn2" @click="ch(-1)">◀</button>
    <div class="date-lbl">{{ dlbl }}</div>
    <button class="date-btn2" @click="ch(1)" :disabled="today">▶</button>
  </div>
  <div class="day-stat">
    <div class="item"><span class="num" style="color:#52c41a">{{ pu }}</span><span class="lbl">上车</span></div>
    <div class="div"></div>
    <div class="item"><span class="num" style="color:#ff4d4f">{{ do_ }}</span><span class="lbl">下车</span></div>
    <div class="div"></div>
    <div class="item"><span class="num" style="color:#1677ff">{{ Math.min(pu,do_) }}</span><span class="lbl">完成</span></div>
  </div>
  <div v-if="recs.length">
    <div v-for="r in recs" :key="r.id" class="rec-card">
      <div class="rec-icon2">{{ r.type==='up'?'🚗':'🏁' }}</div>
      <div class="rec-body">
        <div class="rec-kind">{{ r.type==='up'?'乘客上车':'乘客下车' }}</div>
        <div class="rec-addr">{{ r.addr }}</div>
        <div class="rec-time2">{{ ft(r.time) }}</div>
      </div>
      <button class="rec-del" @click="del(r.id)">✕</button>
    </div>
  </div>
  <div class="empty-state" v-else>
    <div class="e-icon">📋</div><div class="e-txt">当日暂无记录</div><div class="e-tip">在「记录」页面点击按钮即可记录</div>
  </div>
</div>`,
  setup(){
    const sel=Vue.ref(new Date());
    const dlbl=Vue.computed(()=>{
      const d=sel.value,t=new Date(),y=new Date(t);y.setDate(t.getDate()-1);
      if(d.toDateString()===t.toDateString())return'今天';
      if(d.toDateString()===y.toDateString())return'昨天';
      return `${d.getMonth()+1}月${d.getDate()}日`;
    });
    const today=Vue.computed(()=>sel.value.toDateString()===new Date().toDateString());
    const recs=Vue.computed(()=>{ const{s,e}=dr_(sel.value);return flt(S.rides,s,e); });
    const pu=Vue.computed(()=>recs.value.filter(x=>x.type==='up').length);
    const do_=Vue.computed(()=>recs.value.filter(x=>x.type==='down').length);
    const ch=d=>{const v=new Date(sel.value);v.setDate(v.getDate()+d);if(v<=new Date())sel.value=v;};
    const ft=s=>{const d=new Date(s);return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;};
    const del=id=>{if(confirm('删除此记录？'))delR(id);};
    return{sel,dlbl,today,recs,pu,do_,ch,ft,del};
  }
};

// ==================== 收支页 ====================
const IncPage = {
  template:`
<div class="inc page-view">
  <div class="inc-card">
    <div class="inc-card-hd">💰 今日收支</div>
    <div class="inc-card-bd">
      <div class="ci"><div class="ci-lbl">流水</div><div class="ci-val green">+¥{{ di.in.toFixed(2) }}</div></div>
      <div class="ci"><div class="ci-lbl">支出</div><div class="ci-val red">-¥{{ di.out.toFixed(2) }}</div></div>
      <div class="ci"><div class="ci-lbl">净赚</div><div class="ci-val" :class="di.in-di.out>=0?'green':'red'">{{ di.in-di.out>=0?'+':'-' }}¥{{ Math.abs(di.in-di.out).toFixed(2) }}</div></div>
    </div>
  </div>
  <div class="form-box">
    <div class="form-title">📝 记一笔</div>
    <div class="cat-row">
      <div v-for="c in cats" :key="c.v" class="cat-pill" :class="fm.cat===c.v?(c.t==='in'?'on-inc':'on-exp'):''" @click="fm.cat=c.v">{{ c.l }}</div>
    </div>
    <div class="amt-row"><span class="yuan">¥</span><input class="amt-input" v-model="fm.amt" type="number" placeholder="0.00" step="0.01" /></div>
    <input class="note-input2" v-model="fm.note" placeholder="备注（可选）" />
    <button class="do-btn" @click="submit" :disabled="!fm.amt">记一笔</button>
  </div>
  <div class="quick-row">
    <button v-for="q in quicks" :key="q.v" class="quick-btn2" @click="qk(q.v,q.a)">{{ q.l }}<small>¥{{ q.a }}</small></button>
  </div>
  <div class="sec-title">📋 今日记录（实时）</div>
  <div class="inc-list" v-if="recs.length">
    <div v-for="r in recs" :key="r.id" class="inc-row">
      <div class="inc-body">
        <div class="inc-cat">{{ r.cat }}</div>
        <div class="inc-note" v-if="r.note">{{ r.note }}</div>
        <div class="inc-time">{{ ft(r.time) }}</div>
      </div>
      <div class="inc-amt" :class="r.type==='in'?'green':'red'">{{ r.type==='in'?'+':'-' }}¥{{ r.amt.toFixed(2) }}</div>
      <button class="inc-del" @click="del(r.id)">✕</button>
    </div>
  </div>
  <div class="empty-state" v-else style="padding:20px 0"><div class="e-txt">暂无记录</div></div>
</div>`,
  setup(){
    const cats=[
      {l:'💰 流水',v:'流水',t:'in'},
      {l:'🔌 充电',v:'充电',t:'out'},
      {l:'🍜 餐费',v:'餐费',t:'out'},
      {l:'🎫 免佣',v:'免佣卡',t:'out'},
      {l:'🅿️ 停车',v:'停车',t:'out'},
      {l:'📦 其他',v:'其他',t:'out'},
    ];
    const quicks=[{l:'充电',v:'充电',a:50},{l:'餐费',v:'餐费',a:30},{l:'停车',v:'停车',a:10},{l:'免佣',v:'免佣卡',a:20}];
    const fm=Vue.reactive({cat:'流水',amt:'',note:''});
    const di=Vue.computed(()=>{const{s,e}=dr_(new Date());const a=flt(S.inc,s,e);const inn=a.filter(x=>x.type==='in').reduce((s,x)=>s+x.amt,0);const out=a.filter(x=>x.type==='out').reduce((s,x)=>s+x.amt,0);return{inn,out};});
    const recs=Vue.computed(()=>{const{s,e}=dr_(new Date());return flt(S.inc,s,e);});
    const submit=()=>{if(!fm.amt)return;addI(fm.cat,fm.amt,fm.note);fm.amt='';fm.note='';};
    const qk=(v,a)=>addI(v,a,'');
    const ft=s=>{const d=new Date(s);return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};
    const del=id=>{if(confirm('删除？'))delI(id);};
    return{cats,quicks,fm,di,recs,submit,qk,ft,del};
  }
};

// ==================== 统计页 ====================
const StatPage = {
  template:`
<div class="stat page-view">
  <div class="wk-card">
    <div class="wk-hd">📅 {{ wlbl }}</div>
    <div class="wk-grid">
      <div class="wk-item"><div class="wi-icon">🚗</div><div class="wi-num">{{ trips }}</div><div class="wi-lbl">完成单</div></div>
      <div class="wk-item"><div class="wi-icon">💰</div><div class="wi-num" style="color:#b7eb8f">¥{{ wi.in.toFixed(0) }}</div><div class="wi-lbl">流水</div></div>
      <div class="wk-item"><div class="wi-icon">📉</div><div class="wi-num" style="color:#ff7875">¥{{ wi.out.toFixed(0) }}</div><div class="wi-lbl">支出</div></div>
      <div class="wk-item"><div class="wi-icon">🏆</div><div class="wi-num" :style="{color:wi.in-wi.out>=0?'#b7eb8f':'#ff7875'}">¥{{ (wi.in-wi.out).toFixed(0) }}</div><div class="wi-lbl">净赚</div></div>
    </div>
  </div>
  <div class="card2">
    <div class="card2-hd">⏰ 高峰接单时段</div>
    <div class="peak-row">
      <span class="peak-pill" v-for="h in peaks" :key="h">{{ h }}</span>
      <span style="font-size:12px;color:#bbb" v-if="!peaks.length">继续记录，数据越多越准</span>
    </div>
    <div class="bar-chart">
      <div v-for="(v,i) in hrly" :key="i" class="bar-col" :title="i+':00 '+v+'单'">
        <div class="bar-fg" :style="{height:bh(v)}"></div>
        <div class="bar-lbl" v-if="i%4===0">{{ i }}</div>
      </div>
    </div>
    <div class="x-lbl">0 ─────────────────────────────── 23</div>
  </div>
  <div class="card2" v-if="Object.keys(wi.by).length">
    <div class="card2-hd">💸 支出分类</div>
    <div v-for="(v,c) in wi.by" :key="c" class="exp-row">
      <span class="exp-c">{{ c }}</span>
      <div class="exp-bd"><div class="exp-fg" :style="{width:ew(v)}"></div></div>
      <span class="exp-v">¥{{ v.toFixed(0) }}</span>
    </div>
  </div>
  <div class="card2">
    <div class="card2-hd">🔥 上车热力图（本周）</div>
    <div id="hm-box" class="hm-box"></div>
    <div class="hm-tip" v-if="!pks.length">记录更多上车位置后自动生成</div>
  </div>
  <div class="wk-nav">
    <button class="wk-nav-btn" @click="wk(-1)">◀ 上周</button>
    <button class="wk-nav-btn" @click="wk(1)" :disabled="isCW">下周 ▶</button>
  </div>
</div>`,
  setup(){
    const sel=Vue.ref(new Date());
    const wlbl=Vue.computed(()=>{const{s,e}=wr_(sel.value);return`${s.getMonth()+1}/${s.getDate()} - ${e.getMonth()+1}/${e.getDate()}`;});
    const isCW=Vue.computed(()=>{const{s,e}=wr_(new Date());const{si,ei}=wr_(sel.value);return si.getTime()===s.getTime();});
    const wk=d=>{const v=new Date(sel.value);v.setDate(v.getDate()+d*7);sel.value=v;};
    const wr=Vue.computed(()=>{const{s,e}=wr_(sel.value);return flt(S.rides,s,e);});
    const wi=Vue.computed(()=>{const{s,e}=wr_(sel.value);const a=flt(S.inc,s,e);const inn=a.filter(x=>x.type==='in').reduce((s,x)=>s+x.amt,0);const out=a.filter(x=>x.type==='out').reduce((s,x)=>s+x.amt,0);const by={};a.filter(x=>x.type==='out').forEach(x=>{by[x.cat]=(by[x.cat]||0)+x.amt;});return{inn,out,by};});
    const pks=Vue.computed(()=>wr.value.filter(x=>x.type==='up'));
    const trips=Vue.computed(()=>Math.min(wr.value.filter(x=>x.type==='up').length,wr.value.filter(x=>x.type==='down').length));
    const hrly=Vue.computed(()=>{const h=new Array(24).fill(0);wr.value.filter(x=>x.type==='up').forEach(x=>{h[new Date(x.time).getHours()]++;});return h;});
    const peaks=Vue.computed(()=>hrly.value.map((v,i)=>({i,v})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v).slice(0,3).map(x=>`${x.i}:00`));
    const mx=Vue.computed(()=>Math.max(...hrly.value,1));
    const bh=v=>`${4+(v/mx.value)*44}px`;
    const mxE=Vue.computed(()=>Math.max(...Object.values(wi.value.by),1));
    const ew=v=>`${Math.min(100,(v/mxE.value)*100)}%`;
    let hmMap=null,hm=null;
    const initHM=()=>{
      const el=document.getElementById('hm-box');
      if(!el||typeof AMap==='undefined')return;
      hmMap=new AMap.Map('hm-box',{zoom:12,center:pks.value.length?[pks.value[0].lng,pks.value[0].lat]:[116.397428,39.90923]});
      AMap.plugin('AMap.Heatmap',()=>{hm=new AMap.Heatmap(hmMap,{radius:25,opacity:[0.4,0.8]});updHM();});
    };
    const updHM=()=>{if(!hm||!pks.value.length)return;hm.setDataSet({data:pks.value.map(r=>({lng:r.lng,lat:r.lat,weight:1}))});};
    Vue.onMounted(()=>setTimeout(initHM,600));
    Vue.watch(pks,updHM);
    Vue.onUnmounted(()=>{if(hmMap)hmMap.destroy();});
    return{sel,wlbl,isCW,wk,wr,wi,pks,trips,hrly,peaks,bh,ew};
  }
};

// ==================== App ====================
const routes=[
  {path:'/',component:MapPage},
  {path:'/hist',component:HistPage},
  {path:'/inc',component:IncPage},
  {path:'/stat',component:StatPage},
];
const router=VueRouter.createRouter({history:VueRouter.createWebHashHistory(),routes});
const App={
  router,
  template:`
<router-view class="page-view"></router-view>
<nav class="tab-bar">
  <div class="tab-item" :class="{on:$route.path==='/'}" @click="$router.push('/')"><span class="tab-icon">📍</span><span class="tab-label">记录</span></div>
  <div class="tab-item" :class="{on:$route.path==='/hist'}" @click="$router.push('/hist')"><span class="tab-icon">📋</span><span class="tab-label">历史</span></div>
  <div class="tab-item" :class="{on:$route.path==='/inc'}" @click="$router.push('/inc')"><span class="tab-icon">💰</span><span class="tab-label">收支</span></div>
  <div class="tab-item" :class="{on:$route.path==='/stat'}" @click="$router.push('/stat')"><span class="tab-icon">📊</span><span class="tab-label">统计</span></div>
</nav>`
};
Vue.createApp(App).use(router).mount('#app');

})();
</script>
</body>
</html>
